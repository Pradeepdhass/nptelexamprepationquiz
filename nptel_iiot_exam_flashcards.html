</div>

  {w:11,q:"Intrusion Triangle consists of Opportunity, Means, and ___?",a:"Motive",e:"Intrusion Triangle = Motive + Opportunity + Means."},

  // Week 12
  {w:12,q:"In Oil & Gas workflow, what immediately precedes cloud analytics platform?",a:"Data analysis by ETL (Extract, Transform, Load)",e:"ETL → Cloud analytics. ETL comes right before cloud platform."},
  {w:12,q:"TRUE or FALSE: In ML & Cloud workflow, identifying data types occurs AFTER analyzing data.",a:"TRUE",e:"Analyze/evaluate first, then identify specific data types."},
  {w:12,q:"Primary goal of Predictive Maintenance in Chemical Industry?",a:"Address real-time issues",e:"Predictive = detect problems in real time before failure."},
  {w:12,q:"'Detect contamination or attacks' is part of which Chemical Industry action?",a:"Improve Logistics",e:"Logistics improvement includes contamination/attack detection."},

  {w:12,q:"UAV application in Energy Management?",a:"Inspecting large boilers at power plants",e:"UAVs inspect hard-to-reach infrastructure like boilers."},
  {w:12,q:"UAV surface surveys in mining primarily used for?",a:"Optimized blast design",e:"Regular surveys → map terrain → optimize blasting."},
  {w:12,q:"Healthcare drones research: drones with ___ to help senior population?",a:"Manipulator arms",e:"Arms = assist elderly with physical tasks."},
  {w:12,q:"UAVs assist Telecom sector by?",a:"Testing network coverage and stability",e:"UAVs fly around testing signal strength and stability."},
  {w:12,q:"Case study enables researcher to examine data within a ___?",a:"Specific context",e:"Case study = deep dive into specific real-world context."},
  {w:12,q:"TRUE or FALSE: Case studies provide ONLY qualitative analysis.",a:"FALSE",e:"Case studies provide BOTH qualitative AND quantitative analysis."},
  {w:12,q:"Key point in all case studies = reduction of ___ of workers?",a:"Health hazards",e:"Worker safety = central concern in all IIoT case studies."},
  {w:12,q:"Case studies explore and investigate through?",a:"Real-life phenomenon",e:"Case studies = investigate actual real-world situations."},
];

let deck = [...ALL];
let idx = 0;
let flipped = false;
let status = {}; // idx: 'k' or 'r'
let filterWeek = 0;
let filteredDeck = [...ALL];

function getFiltered() {
  return filterWeek === 0 ? ALL : ALL.filter(q => q.w === filterWeek);
}

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = '';
  const select = document.createElement('select');
  select.className = 'week-select-menu';
  select.onchange = (e) => {
    filterWeek = parseInt(e.target.value, 10);
    reset();
  };
  
  const optAll = document.createElement('option');
  optAll.value = 0;
  optAll.textContent = 'All Weeks';
  if (filterWeek === 0) optAll.selected = true;
  select.appendChild(optAll);
  
  for(let w = 1; w <= 12; w++) {
    const opt = document.createElement('option');
    opt.value = w;
    opt.textContent = 'Week ' + w;
    if (filterWeek === w) opt.selected = true;
    select.appendChild(opt);
  }
  container.appendChild(select);
}

function reset() {
  filteredDeck = getFiltered();
  idx = 0;
  flipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  renderTabs();
  render();
}

function render() {
  if(filteredDeck.length === 0) return;
  const q = filteredDeck[idx];
  document.getElementById('qtext').textContent = 'W' + q.w + ' Q' + (ALL.indexOf(q) % 15 + 1) + ': ' + q.q;
  document.getElementById('atext').textContent = q.a;
  document.getElementById('exptext').textContent = q.e;
  const tf = q.a === 'TRUE' || q.a === 'FALSE';
  const tag = document.getElementById('anstag');
  if(tf) {
    tag.innerHTML = '<span class="tag ' + (q.a==='TRUE'?'tag-t':'tag-f') + '">' + q.a + '</span>';
  } else { tag.innerHTML = ''; }
  
  const optContainer = document.getElementById('optionsContainer');
  optContainer.innerHTML = '';
  const banner = document.getElementById('resultBanner');
  banner.textContent = '';
  banner.className = 'result-banner result-neutral';
  
  let options = [];
  if (tf) {
    options = ['TRUE', 'FALSE'];
  } else {
    options.push(q.a);
    let others = ALL.filter(item => item.a !== q.a && item.a !== 'TRUE' && item.a !== 'FALSE').map(item => item.a);
    others = [...new Set(others)].sort(() => Math.random() - 0.5);
    options.push(...others.slice(0, 3));
    options = options.sort(() => Math.random() - 0.5);
  }
  
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'mcq-btn';
    btn.textContent = opt;
    btn.onclick = (e) => checkAnswer(e, opt, q.a);
    optContainer.appendChild(btn);
  });

  document.getElementById('prog').textContent = (idx+1) + ' / ' + filteredDeck.length;
  updateStats();
}

function checkAnswer(e, selected, correct) {
  e.stopPropagation();
  const buttons = document.getElementById('optionsContainer').querySelectorAll('.mcq-btn');
  buttons.forEach(btn => btn.disabled = true);
  
  const banner = document.getElementById('resultBanner');
  
  if (selected === correct) {
    e.target.classList.add('correct');
    banner.textContent = 'CORRECT';
    banner.className = 'result-banner result-correct';
    mark('k', true);
  } else {
    e.target.classList.add('wrong');
    buttons.forEach(btn => {
      if (btn.textContent === correct) btn.classList.add('correct');
    });
    banner.textContent = 'INCORRECT';
    banner.className = 'result-banner result-wrong';
    mark('r', true);
  }
  
  setTimeout(() => {
    if (!flipped) flip();
  }, 600);
}

function flip(e) {
  if (e && e.target.closest('.mcq-btn')) return;
  flipped = !flipped;
  document.getElementById('cardInner').classList.toggle('flipped', flipped);
}

function nav(dir) {
  idx = (idx + dir + filteredDeck.length) % filteredDeck.length;
  flipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  render();
}

function mark(type, noNav = false) {
  const q = filteredDeck[idx];
  const key = ALL.indexOf(q);
  status[key] = type;
  if (!noNav) nav(1);
  else updateStats();
}

function updateStats() {
  const cur = getFiltered();
  let k=0,r=0,u=0;
  cur.forEach(q => {
    const key = ALL.indexOf(q);
    if(status[key]==='k') k++;
    else if(status[key]==='r') r++;
    else u++;
  });
  document.getElementById('stotal').textContent = cur.length;
  document.getElementById('sknow').textContent = k;
  document.getElementById('sreview').textContent = r;
  document.getElementById('spct').textContent = Math.round((k/cur.length)*100) + '%';
}

reset();
</script>
